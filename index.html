<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="손성짱">
  <meta name="theme-color" content="#534AB7">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23534AB7' width='180' height='180' rx='40'/><text x='90' y='130' font-size='90' text-anchor='middle' font-family='system-ui' fill='white'>🌸</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.min.css">
  <title>손성짱</title>
  <style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--p50:#EEEDFE;--p100:#CECBF6;--p200:#AFA9EC;--p400:#7F77DD;--p600:#534AB7;--p800:#3C3489;}
html,body{width:100%;height:100%;background:#f8f8f8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
input,textarea{-webkit-user-select:text;}

#splash{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,var(--p600),var(--p800));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.splash-logo{font-size:80px;animation:bounce 1s infinite;}
.splash-title{font-size:28px;font-weight:600;color:#fff;margin:10px 0 30px;}
.splash-dots{display:flex;gap:6px;}
.splash-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.6);animation:pulse 1.2s infinite;}
.splash-dot:nth-child(2){animation-delay:0.2s;}
.splash-dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}
#splash.hide{animation:fadeOut 0.4s forwards;}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

.screen{max-width:380px;margin:0 auto;background:#fff;border-radius:20px;border:0.5px solid #ddd;overflow:hidden;min-height:100vh;display:flex;flex-direction:column;}
.ob-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;}
.ob-logo{font-size:60px;margin-bottom:20px;animation:float 2s infinite;}
.ob-title{font-size:26px;font-weight:600;color:var(--p800);margin-bottom:6px;}
.ob-sub{font-size:13px;color:#999;margin-bottom:36px;text-align:center;line-height:1.6;}
.ob-section{width:100%;margin-bottom:20px;}
.ob-label{font-size:12px;font-weight:500;color:var(--p600);margin-bottom:8px;}
.ob-input{width:100%;padding:12px 14px;border-radius:12px;border:0.5px solid #ddd;font-size:14px;background:var(--p50);color:#333;}
.ob-input:focus{outline:none;border-color:var(--p400);box-shadow:0 0 0 3px rgba(127,119,221,0.1);}
.ob-my-code{background:var(--p50);border-radius:12px;padding:12px 16px;margin-bottom:20px;}
.ob-my-code-val{font-size:22px;font-weight:600;color:var(--p800);letter-spacing:4px;margin:6px 0;}
.btn-primary{width:100%;padding:13px;border-radius:14px;border:none;background:var(--p600);color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;}
.btn-ghost{width:100%;padding:10px;border-radius:14px;border:0.5px solid #ddd;background:transparent;color:var(--p600);font-size:13px;cursor:pointer;margin-top:8px;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

.app-header{background:var(--p50);padding:18px 20px 14px;text-align:center;border-bottom:0.5px solid #ddd;}
.app-title{font-size:21px;font-weight:600;color:var(--p800);}
.app-subtitle{font-size:11px;color:#999;margin-top:2px;}
.dday-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
.dday-badge{display:inline-flex;align-items:center;gap:5px;background:var(--p600);color:#fff;font-size:12px;font-weight:500;padding:4px 13px;border-radius:20px;}
.partner-badge{display:inline-flex;background:#f5f5f5;color:#666;font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid #ddd;}
.nav-tabs{display:flex;border-bottom:0.5px solid #ddd;background:#fafafa;}
.nav-tab{flex:1;padding:11px 4px;border:none;background:transparent;font-size:11px;color:#999;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nav-tab i{font-size:18px;}
.nav-tab.active{color:var(--p600);border-bottom:2px solid var(--p600);background:#fff;}
.tab-content{flex:1;padding:16px;overflow-y:auto;}
.section-label{font-size:11px;font-weight:500;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.hidden{display:none !important;}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px;}
.cal-dh{text-align:center;font-size:10px;color:#999;padding:4px 0;}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:50%;cursor:pointer;position:relative;color:#333;}
.cal-d:not(.empty):hover{background:#f0f0f0;}
.cal-d.today{background:var(--p50);color:var(--p600);font-weight:500;}
.cal-d.has-event{background:var(--p600);color:#fff;font-weight:500;}
.cal-d.has-both::after{content:'●';position:absolute;bottom:2px;right:2px;font-size:6px;color:#FAC775;}
.cal-d.empty{opacity:0;}

.legend{display:flex;gap:12px;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#999;}
.legend-dot{width:10px;height:10px;border-radius:50%;}

.upcoming-card{background:#f5f5f5;border-radius:10px;border:0.5px solid #ddd;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.date-circle{width:40px;height:40px;border-radius:50%;background:var(--p50);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;color:var(--p600);}
.upcoming-title{font-size:13px;font-weight:500;color:#333;}
.upcoming-sub{font-size:11px;color:#999;margin-top:2px;}

.month-group{margin-bottom:24px;}
.month-header{font-size:13px;font-weight:600;color:var(--p800);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.month-header::after{content:'';flex:1;height:0.5px;background:#ddd;}
.view-toggle{display:flex;gap:6px;justify-content:flex-end;margin-bottom:10px;}
.vt-btn{padding:6px 10px;border-radius:8px;border:0.5px solid #ddd;background:#f5f5f5;font-size:11px;color:#999;cursor:pointer;}
.vt-btn.active{background:var(--p50);border-color:var(--p400);color:var(--p600);}

.album-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;margin-bottom:10px;}
.album-thumb{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;background:#f5f5f5;display:flex;align-items:center;justify-content:center;cursor:pointer;}
.album-thumb img{width:100%;height:100%;object-fit:cover;}
.album-thumb-inner{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;color:#999;font-size:10px;}
.album-thumb-inner i{font-size:24px;color:var(--p400);}
.album-del-btn{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(83,74,183,0.85);border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.album-add{aspect-ratio:1;border-radius:8px;border:1.5px dashed #ddd;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;color:var(--p400);cursor:pointer;background:#fafafa;font-size:10px;}
.album-add i{font-size:18px;}
#photo-input{display:none;}

.album-detail-card{background:#f5f5f5;border-radius:12px;border:0.5px solid #ddd;margin-bottom:14px;overflow:hidden;}
.album-detail-thumb{width:100%;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:#fff;font-size:13px;}
.album-detail-thumb i{font-size:36px;}
.album-detail-info{padding:10px 12px;}
.album-detail-title{font-size:13px;font-weight:600;color:#333;}
.album-detail-caption{font-size:12px;color:#666;margin-top:4px;line-height:1.5;}
.album-detail-date{font-size:10px;color:var(--p600);margin-top:6px;}

.diary-card{background:#f5f5f5;border-radius:10px;border:0.5px solid #ddd;padding:12px;margin-bottom:10px;}
.diary-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px;}
.diary-title{font-size:13px;font-weight:500;color:#333;flex:1;}
.diary-actions{display:flex;gap:4px;}
.diary-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;color:#999;}
.diary-body{font-size:12px;color:#666;line-height:1.6;margin-top:6px;}
.diary-date{font-size:10px;color:#999;margin-top:8px;text-align:right;}

.add-btn{width:100%;padding:10px;border-radius:10px;border:1.5px dashed #ddd;background:transparent;color:var(--p600);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;}

.modal-backdrop{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(38,33,92,0.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;}
.modal-box{background:#fff;border-radius:16px;border:0.5px solid #ddd;padding:20px;width:100%;max-width:320px;}
.modal-title{font-size:16px;font-weight:600;color:#333;margin-bottom:4px;}
.modal-date{font-size:13px;color:var(--p600);margin-bottom:12px;}
.modal-box input,.modal-box textarea{width:100%;padding:10px 12px;border-radius:10px;border:0.5px solid #ddd;font-size:13px;background:#f5f5f5;color:#333;margin-bottom:8px;font-family:inherit;}
.modal-box textarea{resize:vertical;min-height:70px;}
.type-selector{display:flex;gap:8px;margin-bottom:12px;}
.type-btn{flex:1;padding:8px;border-radius:10px;border:0.5px solid #ddd;background:#f5f5f5;font-size:12px;cursor:pointer;color:#666;}
.type-btn.active{background:var(--p50);border-color:var(--p400);color:var(--p800);font-weight:500;}
.modal-actions{display:flex;gap:8px;margin-top:8px;}
.btn-cancel{flex:1;padding:8px;border-radius:10px;border:0.5px solid #ddd;background:transparent;font-size:13px;color:#666;cursor:pointer;}
.btn-save{flex:1;padding:8px;border-radius:10px;border:none;background:var(--p600);color:#fff;font-size:13px;font-weight:500;cursor:pointer;}
.btn-del{flex:1;padding:8px;border-radius:10px;border:none;background:#f5f5f5;color:#999;font-size:13px;cursor:pointer;}
.existing-event{background:#f5f5f5;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#666;border:0.5px solid #ddd;}
.existing-label{font-size:11px;color:#999;margin-bottom:4px;}
  </style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">🌸</div>
  <div class="splash-title">손성짱</div>
  <div class="splash-dots">
    <div class="splash-dot"></div><div class="splash-dot"></div><div class="splash-dot"></div>
  </div>
</div>

<div id="page-onboarding" class="screen hidden">
  <div class="ob-wrap">
    <div class="ob-logo">🌸</div>
    <div class="ob-title">손성짱</div>
    <div class="ob-sub">우리만의 공간을 만들어요<br>시작 날짜와 이름을 입력해주세요</div>
    <div class="ob-section"><div class="ob-label">내 이름</div>
      <input class="ob-input" id="ob-name" type="text" placeholder="예: 성민" /></div>
    <div class="ob-section"><div class="ob-label">만난 날짜</div>
      <input class="ob-input" id="ob-date" type="date" /></div>
    <button class="btn-primary" onclick="obNext()">다음 →</button>
  </div>
</div>

<div id="page-connect" class="screen hidden">
  <div class="ob-wrap">
    <div style="font-size:40px;margin-bottom:12px;">💜</div>
    <div class="ob-title">연동하기</div>
    <div class="ob-sub">내 코드를 여친에게 공유하거나<br>여친 코드를 입력해서 연결해요</div>
    <div class="ob-my-code">
      <div style="font-size:11px;color:#999;margin-bottom:4px;">내 커플 코드</div>
      <div class="ob-my-code-val" id="my-code">——</div>
      <div style="font-size:11px;color:#999;margin-top:3px;">여친한테 알려주세요</div>
    </div>
    <button class="btn-ghost" onclick="copyCode()"><i class="ti ti-copy"></i> 코드 복사</button>
    <div style="text-align:center;font-size:12px;color:#999;margin:4px 0 20px;">또는</div>
    <div class="ob-section"><div class="ob-label">여친 코드</div>
      <input class="ob-input" id="ob-code" type="text" maxlength="6" placeholder="A1B2C3" style="letter-spacing:4px;font-size:16px;text-align:center;" oninput="this.value=this.value.toUpperCase()" /></div>
    <button class="btn-primary" onclick="obConnect()">연동하고 시작</button>
    <button class="btn-ghost" onclick="obSkip()">나중에 할게요</button>
  </div>
</div>

<div id="page-app" class="screen hidden">
  <div class="app-header">
    <div class="app-title">🌸 손성짱</div>
    <div class="app-subtitle" id="subtitle">우리만의 공간</div>
    <div class="dday-row">
      <div class="dday-badge"><i class="ti ti-heart"></i><span id="dday">D+0</span></div>
      <div class="partner-badge" id="pb" style="display:none;"><i class="ti ti-link"></i>연동됨</div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="tab('cal',this)"><i class="ti ti-calendar"></i>캘린더</button>
    <button class="nav-tab" onclick="tab('album',this)"><i class="ti ti-photo"></i>앨범</button>
    <button class="nav-tab" onclick="tab('diary',this)"><i class="ti ti-notes"></i>우리 일기</button>
    <button class="nav-tab" onclick="tab('set',this)"><i class="ti ti-settings"></i>설정</button>
  </div>

  <div id="tab-cal" class="tab-content">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--p600)"></div>일정</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--p50)"></div>오늘</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <button onclick="prevM()" style="background:none;border:none;cursor:pointer;color:#999;font-size:20px;">‹</button>
      <span id="month" style="font-size:14px;font-weight:500;color:#333;"></span>
      <button onclick="nextM()" style="background:none;border:none;cursor:pointer;color:#999;font-size:20px;">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dh" style="color:var(--p600)">일</div>
      <div class="cal-dh">월</div><div class="cal-dh">화</div><div class="cal-dh">수</div>
      <div class="cal-dh">목</div><div class="cal-dh">금</div><div class="cal-dh" style="color:var(--p600)">토</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div style="margin-top:14px;"><div class="section-label">다가오는 약속</div><div id="upcoming"></div></div>
  </div>

  <div id="tab-album" class="tab-content hidden">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div class="section-label" style="margin-bottom:0;">추억 앨범</div>
      <div class="view-toggle">
        <button class="vt-btn active" id="vt-grid" onclick="setAlbumView('grid')"><i class="ti ti-layout-grid"></i></button>
        <button class="vt-btn" id="vt-list" onclick="setAlbumView('list')"><i class="ti ti-layout-list"></i></button>
      </div>
    </div>
    <div id="album-container"></div>
    <input type="file" id="photo-input" accept="image/*" onchange="addPhoto()">
  </div>

  <div id="tab-diary" class="tab-content hidden">
    <div class="section-label">우리 일기</div>
    <div id="diary-list"></div>
    <button class="add-btn" onclick="openDiary()"><i class="ti ti-plus"></i>일기 추가</button>
  </div>

  <div id="tab-set" class="tab-content hidden">
    <div class="section-label">설정</div>
    <div style="background:#f5f5f5;border-radius:12px;border:0.5px solid #ddd;overflow:hidden;margin-bottom:16px;">
      <div style="padding:14px 16px;border-bottom:0.5px solid #ddd;">
        <div style="font-size:12px;color:#999;margin-bottom:4px;">내 이름</div>
        <div style="font-size:14px;font-weight:600;" id="set-name">—</div>
      </div>
      <div style="padding:14px 16px;border-bottom:0.5px solid #ddd;">
        <div style="font-size:12px;color:#999;margin-bottom:4px;">만난 날</div>
        <div style="font-size:14px;font-weight:600;" id="set-date">—</div>
      </div>
      <div style="padding:14px 16px;">
        <div style="font-size:12px;color:#999;margin-bottom:4px;">내 코드</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="font-size:18px;font-weight:600;color:var(--p800);letter-spacing:3px;" id="set-code">—</div>
          <button onclick="copyCode()" style="background:var(--p50);border:0.5px solid #ddd;border-radius:8px;padding:4px 10px;font-size:11px;color:var(--p600);cursor:pointer;">복사</button>
        </div>
      </div>
    </div>
    <div style="background:#f5f5f5;border-radius:12px;border:0.5px solid #ddd;padding:14px 16px;margin-bottom:16px;">
      <div style="font-size:12px;color:#999;margin-bottom:8px;">파트너 연동</div>
      <div id="set-partner" style="font-size:13px;color:#333;margin-bottom:10px;">연동 안 됨</div>
      <input id="set-code-in" class="ob-input" type="text" maxlength="6" placeholder="코드 입력" style="letter-spacing:3px;font-size:15px;margin-bottom:8px;" oninput="this.value=this.value.toUpperCase()" />
      <button onclick="connectNow()" style="width:100%;padding:9px;border-radius:10px;border:none;background:var(--p600);color:#fff;font-size:13px;font-weight:500;cursor:pointer;">연동</button>
    </div>
    <button onclick="reset()" style="width:100%;padding:10px;border-radius:10px;border:0.5px solid #ddd;background:transparent;color:#999;font-size:13px;cursor:pointer;">처음으로</button>
  </div>
</div>

<div id="modal-day" class="modal-backdrop hidden">
  <div class="modal-box">
    <div class="modal-title" id="modal-day-title">일정 추가</div>
    <div class="modal-date" id="modal-day-date"></div>
    <div id="existing" class="hidden">
      <div class="existing-label">현재 일정</div>
      <div class="existing-event" id="existing-text"></div>
    </div>
    <div class="type-selector">
      <button class="type-btn active" id="btn-met" onclick="setType('met')">💕 만난 날</button>
      <button class="type-btn" id="btn-promise" onclick="setType('promise')">📅 약속</button>
    </div>
    <input id="event-label" type="text" placeholder="메모 (선택사항)" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDay()">취소</button>
      <button id="btn-del" class="btn-del hidden" onclick="delEvent()">삭제</button>
      <button class="btn-save" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<div id="modal-diary" class="modal-backdrop hidden">
  <div class="modal-box">
    <div class="modal-title" id="diary-title">일기 쓰기 ✏️</div>
    <input id="diary-title-in" type="text" placeholder="제목" />
    <textarea id="diary-body-in" placeholder="오늘의 일기를 써보세요..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDiary()">취소</button>
      <button id="btn-diary-del" class="btn-del hidden" onclick="delDiary()">삭제</button>
      <button class="btn-save" onclick="saveDiary()">저장</button>
    </div>
  </div>
</div>

<script>
const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const ME=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const PC=['#EEEDFE','#E1F5EE','#E6F1FB','#FAEEDA','#FBEAF0'];

let state={myName:'',startDate:'',myCode:'',partnerCode:'',events:{},photos:[],diary:[],nextPhotoId:1,nextDiaryId:1};
let curY=2026,curM=5,selType='met',editKey=null,editDiaryId=null,albumView='grid';

function load(){const s=localStorage.getItem('s');if(s)state=JSON.parse(s);}
function save(){localStorage.setItem('s',JSON.stringify(state));localStorage.setItem('onboarded','1');syncData();}
function syncData(){if(!state.partnerCode)return;const d={events:state.events,photos:state.photos,diary:state.diary,myName:state.myName};localStorage.setItem('p-'+state.partnerCode,JSON.stringify(d));}
function loadPartner(){if(!state.partnerCode)return;const p=localStorage.getItem('p-'+state.myCode);if(p){const d=JSON.parse(p);state.events={...state.events,...d.events};state.photos=[...state.photos,...d.photos];state.diary=[...state.diary,...d.diary];}}
function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}
function genCode(){return Math.random().toString(36).substring(2,8).toUpperCase();}

function splash(){setTimeout(()=>{document.getElementById('splash').classList.add('hide');setTimeout(()=>hide('splash'),400);},1500);}

function obNext(){
  const n=document.getElementById('ob-name').value.trim();
  const d=document.getElementById('ob-date').value;
  if(!n||!d){alert('입력해주세요');return;}
  state.myName=n;state.startDate=d;state.myCode=genCode();
  document.getElementById('my-code').textContent=state.myCode;
  hide('page-onboarding');show('page-connect');
}

function obConnect(){
  const c=document.getElementById('ob-code').value.trim();
  if(c.length===6)state.partnerCode=c;
  launch();
}

function obSkip(){launch();}

function launch(){
  save();loadPartner();hide('page-connect');show('page-app');
  const d=new Date(state.startDate||'2025-03-10');
  const diff=Math.floor((new Date()-d)/864e5);
  document.getElementById('dday').textContent='D+'+(diff<0?0:diff);
  document.getElementById('subtitle').textContent=state.myName+'의 공간 💜';
  document.getElementById('set-name').textContent=state.myName||'—';
  document.getElementById('set-date').textContent=state.startDate||'—';
  document.getElementById('set-code').textContent=state.myCode||'—';
  if(state.partnerCode){show('pb');document.getElementById('set-partner').textContent='코드: '+state.partnerCode;}
  if(state.startDate){const d=new Date(state.startDate);const k=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();if(!state.events[k])state.events[k]={type:'met',label:'처음 만난 날 💕'};}
  renderCal();renderAlbum();renderDiary();
}

function copyCode(){const c=state.myCode||document.getElementById('my-code').textContent;if(navigator.clipboard)navigator.clipboard.writeText(c).then(()=>alert('복사됨'));else alert('코드: '+c);}

function connectNow(){
  const c=document.getElementById('set-code-in').value.trim();
  if(c.length!==6){alert('6자리');return;}
  state.partnerCode=c;save();show('pb');document.getElementById('set-partner').textContent='코드: '+c;alert('연동됨 💜');
}

function reset(){if(!confirm('초기화?'))return;localStorage.clear();location.reload();}

function dk(y,m,d){return y+'-'+m+'-'+d;}

function renderCal(){
  document.getElementById('month').textContent=curY+'년 '+MN[curM];
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  const today=new Date();const fd=new Date(curY,curM,1).getDay();const dim=new Date(curY,curM+1,0).getDate();
  for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='cal-d empty';grid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const e=document.createElement('div');e.className='cal-d';e.textContent=d;
    const key=dk(curY,curM,d);const ev=state.events[key];
    const isToday=today.getFullYear()===curY&&today.getMonth()===curM&&today.getDate()===d;
    if(ev){e.classList.add('has-event');if(ev.type==='promise'){e.classList.add('has-both');}}
    if(isToday)e.classList.add('today');
    e.onclick=()=>openDay(curY,curM,d,key,ev);grid.appendChild(e);
  }
  renderUpcoming();
}

function renderUpcoming(){
  const list=document.getElementById('upcoming');list.innerHTML='';
  const today=new Date();
  const up=Object.entries(state.events).filter(([k,v])=>v.type==='promise').map(([k,v])=>{
    const p=k.split('-');const d=new Date(+p[0],+p[1],+p[2]);return{label:v.label,date:d,diff:Math.ceil((d-today)/864e5)};
  }).filter(e=>e.diff>=0).sort((a,b)=>a.diff-b.diff).slice(0,3);
  if(!up.length){list.innerHTML='<div style="font-size:12px;color:#999;padding:6px 0;">없음</div>';return;}
  up.forEach(e=>{
    const c=document.createElement('div');c.className='upcoming-card';
    c.innerHTML=`<div class="date-circle"><div>${ME[e.date.getMonth()]}</div><div style="font-size:14px;font-weight:600;color:var(--p800);">${e.date.getDate()}</div></div><div style="flex:1;"><div class="upcoming-title">${e.label||'약속'}</div><div class="upcoming-sub">${e.diff===0?'오늘!':'in '+e.diff+'일'}</div></div>`;
    list.appendChild(c);
  });
}

function prevM(){curM--;if(curM<0){curM=11;curY--;}renderCal();}
function nextM(){curM++;if(curM>11){curM=0;curY++;}renderCal();}

function openDay(y,m,d,key,ev){
  editKey=key;selType=ev?ev.type:'met';
  document.getElementById('modal-day-date').textContent=y+'년 '+(m+1)+'월 '+d+'일';
  document.getElementById('event-label').value=ev?ev.label:'';
  const ex=document.getElementById('existing'),db=document.getElementById('btn-del');
  if(ev){ex.classList.remove('hidden');document.getElementById('existing-text').textContent=(ev.type==='met'?'💕 만난 날':'📅 약속')+(ev.label?' — '+ev.label:'');db.classList.remove('hidden');document.getElementById('modal-day-title').textContent='일정 수정';}
  else{ex.classList.add('hidden');db.classList.add('hidden');document.getElementById('modal-day-title').textContent='일정 추가';}
  updateTypeBtn();show('modal-day');
}

function closeDay(){hide('modal-day');editKey=null;}
function setType(t){selType=t;updateTypeBtn();}
function updateTypeBtn(){document.getElementById('btn-met').className='type-btn'+(selType==='met'?'active':'');document.getElementById('btn-promise').className='type-btn'+(selType==='promise'?'active':'');}
function saveEvent(){state.events[editKey]={type:selType,label:document.getElementById('event-label').value.trim()};save();closeDay();renderCal();}
function delEvent(){if(!confirm('삭제?'))return;delete state.events[editKey];save();closeDay();renderCal();}

function setAlbumView(v){albumView=v;document.getElementById('vt-grid').className='vt-btn'+(v==='grid'?'active':'');document.getElementById('vt-list').className='vt-btn'+(v==='list'?'active':'');renderAlbum();}

function renderAlbum(){
  const container=document.getElementById('album-container');container.innerHTML='';
  const groups={};
  state.photos.forEach(p=>{const d=new Date(p.date||'2025-01-01');const key=d.getFullYear()+'년 '+MN[d.getMonth()];if(!groups[key])groups[key]=[];groups[key].push(p);});
  const sortedKeys=Object.keys(groups).sort((a,b)=>{const pa=a.match(/(\d+)년/),pb=b.match(/(\d+)년/);if(!pa||!pb)return 0;const moa=parseInt(a.match(/(\d+)월/)[1]),mob=parseInt(b.match(/(\d+)월/)[1]);return (+pb[1]*12+mob)-(+pa[1]*12+moa);});
  
  sortedKeys.forEach(monthKey=>{
    const grp=groups[monthKey];const section=document.createElement('div');section.className='month-group';section.innerHTML=`<div class="month-header">${monthKey}</div>`;
    
    if(albumView==='grid'){
      const grid=document.createElement('div');grid.className='album-grid';
      grp.forEach(p=>{const thumb=document.createElement('div');thumb.className='album-thumb';if(p.data){const img=document.createElement('img');img.src=p.data;thumb.appendChild(img);}else{const inner=document.createElement('div');inner.className='album-thumb-inner';inner.innerHTML=`<i class="ti ti-photo"></i>`;thumb.appendChild(inner);}const btn=document.createElement('button');btn.className='album-del-btn';btn.innerHTML='<i class="ti ti-x"></i>';btn.onclick=()=>{if(!confirm('삭제?'))return;state.photos=state.photos.filter(x=>x.id!==p.id);save();renderAlbum();};thumb.appendChild(btn);grid.appendChild(thumb);});
      section.appendChild(grid);
    }else{
      grp.forEach(p=>{const card=document.createElement('div');card.className='album-detail-card';const thumb=document.createElement('div');thumb.className='album-detail-thumb';thumb.style.background=PC[state.photos.indexOf(p)%PC.length];thumb.innerHTML=`<i class="ti ti-photo"></i><span>${p.name||'사진'}</span>`;const info=document.createElement('div');info.className='album-detail-info';info.innerHTML=`<div style="display:flex;justify-content:space-between;"><div class="album-detail-title">${p.name||'사진'}</div><button onclick="if(!confirm('삭제?'))return;state.photos=state.photos.filter(x=>x.id!==${p.id});save();renderAlbum();" style="background:none;border:none;cursor:pointer;color:#999;font-size:14px;"><i class="ti ti-trash"></i></button></div><div class="album-detail-caption">${p.caption||''}</div><div class="album-detail-date">${p.date}</div>`;card.appendChild(thumb);card.appendChild(info);section.appendChild(card);});
    }
    container.appendChild(section);
  });
  
  const addWrap=document.createElement('div');
  if(albumView==='grid'){
    const addGrid=document.createElement('div');addGrid.className='album-grid';
    const add=document.createElement('div');add.className='album-add';add.innerHTML='<i class="ti ti-plus"></i>';add.onclick=()=>document.getElementById('photo-input').click();addGrid.appendChild(add);addWrap.appendChild(addGrid);
  }else{
    const add=document.createElement('button');add.className='add-btn';add.innerHTML='<i class="ti ti-plus"></i>추억 추가';add.onclick=()=>document.getElementById('photo-input').click();addWrap.appendChild(add);
  }
  container.appendChild(addWrap);
}

function addPhoto(){
  const file=document.getElementById('photo-input').files[0];if(!file)return;
  const reader=new FileReader();reader.onload=e=>{state.photos.push({id:state.nextPhotoId++,name:file.name.split('.')[0],data:e.target.result,date:new Date().toISOString().slice(0,10),caption:''});save();renderAlbum();document.getElementById('photo-input').value='';};reader.readAsDataURL(file);
}

function renderDiary(){
  const list=document.getElementById('diary-list');list.innerHTML='';
  state.diary.forEach(m=>{const card=document.createElement('div');card.className='diary-card';card.innerHTML=`<div class="diary-header"><span class="diary-title">${m.title}</span><div class="diary-actions"><button class="diary-btn" onclick="editDiary(${m.id})"><i class="ti ti-edit"></i></button><button class="diary-btn" onclick="if(!confirm('삭제?'))return;state.diary=state.diary.filter(x=>x.id!==${m.id});save();renderDiary();"><i class="ti ti-trash"></i></button></div></div><div class="diary-body">${m.body.replace(/\n/g,'<br>')}</div><div class="diary-date">${m.date}</div>`;list.appendChild(card);});
}

function openDiary(){editDiaryId=null;document.getElementById('diary-title').textContent='일기 쓰기 ✏️';document.getElementById('diary-title-in').value='';document.getElementById('diary-body-in').value='';document.getElementById('btn-diary-del').classList.add('hidden');show('modal-diary');}

function editDiary(id){const d=state.diary.find(x=>x.id===id);if(!d)return;editDiaryId=id;document.getElementById('diary-title').textContent='일기 수정 ✏️';document.getElementById('diary-title-in').value=d.title;document.getElementById('diary-body-in').value=d.body;document.getElementById('btn-diary-del').classList.remove('hidden');show('modal-diary');}

function closeDiary(){hide('modal-diary');editDiaryId=null;}

function saveDiary(){
  const title=document.getElementById('diary-title-in').value.trim();const body=document.getElementById('diary-body-in').value.trim();
  if(!title&&!body){closeDiary();return;}
  const today=new Date();const dateStr=(today.getMonth()+1)+'월 '+today.getDate()+'일';
  if(editDiaryId!==null){const d=state.diary.find(x=>x.id===editDiaryId);if(d){d.title=title||'일기';d.body=body;}}
  else{state.diary.push({id:state.nextDiaryId++,title:title||'일기',body,date:dateStr});}
  save();closeDiary();renderDiary();
}

function delDiary(){if(!confirm('삭제?'))return;state.diary=state.diary.filter(d=>d.id!==editDiaryId);save();closeDiary();renderDiary();}

function tab(t,btn){['cal','album','diary','set'].forEach(x=>hide('tab-'+x));document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));show('tab-'+t);btn.classList.add('active');}

load();splash();const onboarded=localStorage.getItem('onboarded');
if(onboarded){setTimeout(launch,1500);}
else{setTimeout(()=>{hide('splash');show('page-onboarding');},1500);}

if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(e=>null);}
</script>
</body>
</html>
