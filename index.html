<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="손성짱">
  <meta name="theme-color" content="#534AB7">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23534AB7' width='180' height='180' rx='40'/><text x='90' y='130' font-size='90' text-anchor='middle' font-family='system-ui' fill='white'>🌸</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.min.css">
  <title>손성짱</title>
  
  <style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--p50:#EEEDFE;--p100:#CECBF6;--p200:#AFA9EC;--p400:#7F77DD;--p600:#534AB7;--p800:#3C3489;}
html,body{width:100%;height:100%;background:#f8f8f8;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}

#splash{position:fixed;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,var(--p600) 0%,var(--p800) 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;}
.splash-logo{font-size:80px;animation:bounce 1s infinite;}
.splash-title{font-size:28px;font-weight:600;color:#fff;margin:10px 0 30px;}
.splash-dots{display:flex;gap:6px;}
.splash-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,0.6);animation:pulse 1.2s infinite;}
.splash-dot:nth-child(2){animation-delay:0.2s;}
.splash-dot:nth-child(3){animation-delay:0.4s;}
@keyframes bounce{0%,100%{transform:scale(1);}50%{transform:scale(1.1);}}
@keyframes pulse{0%,100%{opacity:0.3;}50%{opacity:1;}}
#splash.hide{animation:fadeOut 0.4s forwards;}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}

.screen{max-width:380px;margin:0 auto;background:#fff;border-radius:20px;border:0.5px solid #ddd;overflow:hidden;min-height:100vh;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(0,0,0,0.1);}

.ob-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;}
.ob-logo{font-size:60px;margin-bottom:20px;animation:float 2s infinite;}
.ob-title{font-size:26px;font-weight:600;color:var(--p800);margin-bottom:6px;}
.ob-sub{font-size:13px;color:#999;margin-bottom:36px;text-align:center;line-height:1.6;}
.ob-section{width:100%;margin-bottom:20px;}
.ob-label{font-size:12px;font-weight:500;color:var(--p600);margin-bottom:8px;}
.ob-input{width:100%;padding:12px 14px;border-radius:12px;border:0.5px solid #ddd;font-size:14px;background:var(--p50);color:#333;}
.ob-input:focus{outline:none;border-color:var(--p400);box-shadow:0 0 0 3px rgba(127,119,221,0.1);}
.ob-my-code{background:var(--p50);border-radius:12px;padding:12px 16px;margin-bottom:20px;}
.ob-my-code-val{font-size:22px;font-weight:600;color:var(--p800);letter-spacing:4px;margin:6px 0;}
.btn-primary{width:100%;padding:13px;border-radius:14px;border:none;background:var(--p600);color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;}
.btn-primary:active{transform:scale(0.98);}
.btn-ghost{width:100%;padding:10px;border-radius:14px;border:0.5px solid #ddd;background:transparent;color:var(--p600);font-size:13px;cursor:pointer;margin-top:8px;}
@keyframes float{0%,100%{transform:translateY(0);}50%{transform:translateY(-10px);}}

.app-header{background:var(--p50);padding:18px 20px 14px;text-align:center;border-bottom:0.5px solid #ddd;}
.app-title{font-size:21px;font-weight:600;color:var(--p800);}
.app-subtitle{font-size:11px;color:#999;margin-top:2px;}
.dday-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:8px;}
.dday-badge{display:inline-flex;align-items:center;gap:5px;background:var(--p600);color:#fff;font-size:12px;font-weight:500;padding:4px 13px;border-radius:20px;}
.partner-badge{display:inline-flex;align-items:center;gap:4px;background:#f5f5f5;color:#666;font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid #ddd;}

.nav-tabs{display:flex;border-bottom:0.5px solid #ddd;background:#fafafa;}
.nav-tab{flex:1;padding:11px 4px;border:none;background:transparent;font-size:11px;color:#999;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;}
.nav-tab i{font-size:18px;}
.nav-tab.active{color:var(--p600);border-bottom:2px solid var(--p600);background:#fff;}

.tab-content{flex:1;padding:16px;overflow-y:auto;}
.section-label{font-size:11px;font-weight:500;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.hidden{display:none !important;}

.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px;}
.cal-dh{text-align:center;font-size:10px;color:#999;padding:4px 0;font-weight:500;}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:8px;cursor:pointer;position:relative;color:#333;transition:all 0.2s;border:0.5px solid #f0f0f0;}
.cal-d:not(.empty){background:#f9f9f9;}
.cal-d:not(.empty):hover{background:#f0f0f0;}
.cal-d.today{background:var(--p50);color:var(--p600);font-weight:600;border:0.5px solid var(--p200);}
.cal-d.met{background:#FF6B9D;color:#fff;font-weight:600;border:none;font-size:14px;}
.cal-d.promise{background:#FFD93D;color:#333;font-weight:600;border:none;font-size:14px;}
.cal-d.empty{opacity:0;pointer-events:none;}

.legend{display:flex;gap:12px;margin-bottom:12px;font-size:11px;}
.legend-item{display:flex;align-items:center;gap:5px;}
.legend-dot{width:12px;height:12px;border-radius:4px;}

.upcoming-card{background:#f5f5f5;border-radius:10px;border:0.5px solid #ddd;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.date-circle{width:40px;height:40px;border-radius:50%;background:var(--p50);display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:9px;font-weight:500;color:var(--p600);}
.upcoming-title{font-size:13px;font-weight:500;color:#333;}
.upcoming-sub{font-size:11px;color:#999;margin-top:2px;}

.date-filter{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding-bottom:4px;}
.date-filter-btn{padding:6px 12px;border-radius:8px;border:0.5px solid #ddd;background:#f5f5f5;font-size:11px;color:#999;cursor:pointer;white-space:nowrap;}
.date-filter-btn.active{background:var(--p50);border-color:var(--p400);color:var(--p600);font-weight:600;}

.album-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:20px;}
.album-item{border-radius:12px;overflow:hidden;background:#f5f5f5;cursor:pointer;transition:all 0.2s;position:relative;border:0.5px solid #ddd;aspect-ratio:1;}
.album-img{width:100%;height:100%;object-fit:cover;display:block;}
.album-date{position:absolute;bottom:0;left:0;right:0;background:rgba(0,0,0,0.7);color:#fff;font-size:10px;padding:4px 6px;text-align:center;}
.album-del-btn{position:absolute;top:4px;right:4px;width:24px;height:24px;border-radius:50%;background:rgba(83,74,183,0.9);border:none;color:#fff;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.album-add{border:2px dashed var(--p600);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;color:var(--p600);font-size:12px;background:var(--p50);border-radius:12px;font-weight:600;aspect-ratio:1;}
.album-add i{font-size:28px;}
#photo-input{display:none;}

.memo-card{background:#f5f5f5;border-radius:10px;border:0.5px solid #ddd;padding:12px;margin-bottom:10px;}
.memo-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px;}
.memo-title{font-size:13px;font-weight:500;color:#333;flex:1;}
.memo-actions{display:flex;gap:4px;}
.memo-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;color:#999;}
.memo-btn:active{color:var(--p600);}
.memo-body{font-size:12px;color:#666;line-height:1.6;margin-top:6px;white-space:pre-wrap;word-break:break-word;}
.memo-date{font-size:10px;color:#999;margin-top:8px;text-align:right;}

.add-btn{width:100%;padding:12px;border-radius:10px;border:1.5px dashed #ddd;background:transparent;color:var(--p600);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;}

.modal-backdrop{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(38,33,92,0.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;}
.modal-box{background:#fff;border-radius:16px;border:0.5px solid #ddd;padding:20px;width:100%;max-width:320px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:16px;font-weight:600;color:#333;margin-bottom:4px;}
.modal-date{font-size:13px;color:var(--p600);margin-bottom:12px;}
.modal-box input,.modal-box textarea{width:100%;padding:10px 12px;border-radius:10px;border:0.5px solid #ddd;font-size:13px;background:#f5f5f5;color:#333;margin-bottom:8px;font-family:inherit;}
.modal-box textarea{resize:vertical;min-height:80px;}

.type-selector{display:flex;gap:8px;margin-bottom:12px;}
.type-btn{flex:1;padding:8px;border-radius:10px;border:0.5px solid #ddd;background:#f5f5f5;font-size:12px;cursor:pointer;color:#666;}
.type-btn.active{background:var(--p50);border-color:var(--p400);color:var(--p800);font-weight:500;}

.modal-actions{display:flex;gap:8px;margin-top:8px;}
.btn-cancel{flex:1;padding:8px;border-radius:10px;border:0.5px solid #ddd;background:transparent;font-size:13px;color:#666;cursor:pointer;}
.btn-save{flex:1;padding:8px;border-radius:10px;border:none;background:var(--p600);color:#fff;font-size:13px;font-weight:500;cursor:pointer;}
.btn-del{flex:1;padding:8px;border-radius:10px;border:none;background:#f5f5f5;color:#999;font-size:13px;cursor:pointer;}

.existing-event{background:#f5f5f5;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#666;border:0.5px solid #ddd;}
.existing-label{font-size:11px;color:#999;margin-bottom:4px;}

  </style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">🌸</div>
  <div class="splash-title">손성짱</div>
  <div class="splash-dots">
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
    <div class="splash-dot"></div>
  </div>
</div>

<div id="page-onboarding" class="screen hidden">
  <div class="ob-wrap">
    <div class="ob-logo">🌸</div>
    <div class="ob-title">손성짱</div>
    <div class="ob-sub">우리만의 공간을 만들어요<br>시작 날짜와 이름을 입력해주세요</div>
    <div class="ob-section">
      <div class="ob-label">내 이름</div>
      <input class="ob-input" id="ob-name" type="text" placeholder="예: 성민" />
    </div>
    <div class="ob-section">
      <div class="ob-label">만난 날짜</div>
      <input class="ob-input" id="ob-date" type="date" />
    </div>
    <button class="btn-primary" onclick="obNext()">다음 →</button>
  </div>
</div>

<div id="page-connect" class="screen hidden">
  <div class="ob-wrap">
    <div style="font-size:40px;margin-bottom:12px;animation:float 2s infinite;">💜</div>
    <div class="ob-title" style="margin-bottom:6px;">연동하기</div>
    <div class="ob-sub">내 코드를 여친에게 공유하거나<br>여친 코드를 입력해서 연결해요</div>
    <div class="ob-my-code">
      <div style="font-size:11px;color:#999;margin-bottom:4px;">내 커플 코드</div>
      <div class="ob-my-code-val" id="my-code">——</div>
      <div style="font-size:11px;color:#999;margin-top:3px;">여친한테 이 코드를 알려주세요</div>
    </div>
    <button class="btn-ghost" onclick="copyCode()" style="margin-bottom:16px;"><i class="ti ti-copy"></i> 코드 복사</button>
    <div style="text-align:center;font-size:12px;color:#999;margin:4px 0 20px;position:relative;">
      <span style="background:#fff;padding:0 8px;position:relative;z-index:1;">또는</span>
      <div style="position:absolute;top:50%;left:0;right:0;height:0.5px;background:#ddd;"></div>
    </div>
    <div class="ob-section">
      <div class="ob-label">여친 코드</div>
      <input class="ob-input" id="ob-code" type="text" maxlength="6" placeholder="A1B2C3" style="letter-spacing:4px;font-size:16px;text-align:center;" oninput="this.value=this.value.toUpperCase()" />
    </div>
    <button class="btn-primary" onclick="obConnect()">연동하고 시작</button>
    <button class="btn-ghost" onclick="obSkip()">나중에 할게요</button>
  </div>
</div>

<div id="page-app" class="screen hidden">
  <div class="app-header">
    <div class="app-title">🌸 손성짱</div>
    <div class="app-subtitle" id="subtitle">우리만의 공간</div>
    <div class="dday-row">
      <div class="dday-badge"><i class="ti ti-heart"></i><span id="dday">D+0</span></div>
      <div class="partner-badge" id="pb" style="display:none;"><i class="ti ti-link"></i><span>연동됨</span></div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="tab('cal',this)"><i class="ti ti-calendar"></i>캘린더</button>
    <button class="nav-tab" onclick="tab('album',this)"><i class="ti ti-photo"></i>앨범</button>
    <button class="nav-tab" onclick="tab('memo',this)"><i class="ti ti-notes"></i>메모장</button>
    <button class="nav-tab" onclick="tab('set',this)"><i class="ti ti-settings"></i>설정</button>
  </div>

  <div id="tab-cal" class="tab-content">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:#FF6B9D;border-radius:4px;"></div>만난 날</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FFD93D;border-radius:4px;"></div>약속</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--p50);border:0.5px solid var(--p200);"></div>오늘</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <button onclick="prevM()" style="background:none;border:none;cursor:pointer;color:#999;font-size:20px;">‹</button>
      <span id="month" style="font-size:14px;font-weight:500;color:#333;"></span>
      <button onclick="nextM()" style="background:none;border:none;cursor:pointer;color:#999;font-size:20px;">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dh" style="color:#FF6B9D">일</div>
      <div class="cal-dh">월</div><div class="cal-dh">화</div><div class="cal-dh">수</div>
      <div class="cal-dh">목</div><div class="cal-dh">금</div><div class="cal-dh" style="color:#FF6B9D">토</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div style="margin-top:14px;"><div class="section-label">다가오는 약속</div><div id="upcoming"></div></div>
  </div>

  <div id="tab-album" class="tab-content hidden">
    <div class="section-label">추억 앨범</div>
    <div class="date-filter" id="date-filter"></div>
    <div class="album-grid" id="album-grid"></div>
    <input type="file" id="photo-input" accept="image/*" onchange="addPhoto()">
  </div>

  <div id="tab-memo" class="tab-content hidden">
    <div class="section-label">메모장</div>
    <div id="memo-list"></div>
    <button class="add-btn" onclick="openMemo()"><i class="ti ti-plus"></i>메모 추가</button>
  </div>

  <div id="tab-set" class="tab-content hidden">
    <div class="section-label">설정</div>
    <div style="background:#f5f5f5;border-radius:12px;border:0.5px solid #ddd;overflow:hidden;margin-bottom:16px;">
      <div style="padding:14px 16px;border-bottom:0.5px solid #ddd;">
        <div style="font-size:12px;color:#999;margin-bottom:4px;">내 이름</div>
        <div style="font-size:14px;font-weight:600;color:#333;" id="set-name">—</div>
      </div>
      <div style="padding:14px 16px;border-bottom:0.5px solid #ddd;">
        <div style="font-size:12px;color:#999;margin-bottom:4px;">만난 날</div>
        <div style="font-size:14px;font-weight:600;color:#333;" id="set-date">—</div>
      </div>
      <div style="padding:14px 16px;">
        <div style="font-size:12px;color:#999;margin-bottom:4px;">내 코드</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="font-size:18px;font-weight:600;color:var(--p800);letter-spacing:3px;" id="set-code">—</div>
          <button onclick="copyCode()" style="background:var(--p50);border:0.5px solid #ddd;border-radius:8px;padding:4px 10px;font-size:11px;color:var(--p600);cursor:pointer;font-family:inherit;">복사</button>
        </div>
      </div>
    </div>
    <div style="background:#f5f5f5;border-radius:12px;border:0.5px solid #ddd;padding:14px 16px;margin-bottom:16px;">
      <div style="font-size:12px;color:#999;margin-bottom:8px;">파트너 연동</div>
      <div id="set-partner" style="font-size:13px;color:#333;margin-bottom:10px;">연동 안 됨</div>
      <input id="set-code-in" class="ob-input" type="text" maxlength="6" placeholder="코드 입력" style="letter-spacing:3px;font-size:15px;margin-bottom:8px;" oninput="this.value=this.value.toUpperCase()" />
      <button onclick="connectNow()" style="width:100%;padding:9px;border-radius:10px;border:none;background:var(--p600);color:#fff;font-size:13px;font-weight:500;cursor:pointer;">연동</button>
    </div>
    <button onclick="reset()" style="width:100%;padding:10px;border-radius:10px;border:0.5px solid #ddd;background:transparent;color:#999;font-size:13px;cursor:pointer;">처음으로</button>
  </div>
</div>

<div id="modal-day" class="modal-backdrop hidden">
  <div class="modal-box">
    <div class="modal-title" id="modal-day-title">일정 추가</div>
    <div class="modal-date" id="modal-day-date"></div>
    <div id="existing" class="hidden">
      <div class="existing-label">현재 일정</div>
      <div class="existing-event" id="existing-text"></div>
    </div>
    <div class="type-selector">
      <button class="type-btn active" id="btn-met" onclick="setType('met')">💕 만난 날</button>
      <button class="type-btn" id="btn-promise" onclick="setType('promise')">📅 약속</button>
    </div>
    <input id="event-label" type="text" placeholder="메모 (선택사항)" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeDay()">취소</button>
      <button id="btn-del" class="btn-del hidden" onclick="delEvent()">삭제</button>
      <button class="btn-save" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<div id="modal-photo" class="modal-backdrop hidden">
  <div class="modal-box">
    <div class="modal-title">사진 추가</div>
    <img id="photo-preview" style="width:100%;border-radius:10px;margin-bottom:12px;max-height:200px;object-fit:cover;">
    <input id="photo-memo" type="text" placeholder="추억 이름 (선택사항)" />
    <textarea id="photo-caption" placeholder="사진에 대해 간단히 써보세요..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePhoto()">취소</button>
      <button class="btn-save" onclick="savePhoto()">저장</button>
    </div>
  </div>
</div>

<div id="modal-memo" class="modal-backdrop hidden">
  <div class="modal-box">
    <div class="modal-title" id="memo-title">메모 쓰기 ✏️</div>
    <input id="memo-title-in" type="text" placeholder="제목" />
    <textarea id="memo-body-in" placeholder="내용을 입력하세요..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeMemo()">취소</button>
      <button id="btn-memo-del" class="btn-del hidden" onclick="delMemo()">삭제</button>
      <button class="btn-save" onclick="saveMemo()">저장</button>
    </div>
  </div>
</div>

<script>
try {
const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const ME=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];

let state={myName:'',startDate:'',myCode:'',partnerCode:'',events:{},photos:[],memos:[],nextPhotoId:1,nextMemoId:1};
let curY=2026,curM=5,selType='met',editKey=null,editMemoId=null,tempPhotoData=null,albumDateFilter='all';

function load(){try{const s=localStorage.getItem('s');if(s)state=JSON.parse(s);}catch(e){}}
function save(){try{localStorage.setItem('s',JSON.stringify(state));localStorage.setItem('onboarded','1');if(state.partnerCode)syncData();}catch(e){}}
function syncData(){try{if(!state.partnerCode)return;const d={events:state.events,photos:state.photos,memos:state.memos,myName:state.myName,startDate:state.startDate};localStorage.setItem('p-'+state.partnerCode,JSON.stringify(d));}catch(e){}}
function loadPartnerData(){try{if(!state.partnerCode)return;const p=localStorage.getItem('p-'+state.myCode);if(p){const d=JSON.parse(p);state.events={...state.events,...d.events};state.photos=[...(state.photos||[]),...(d.photos||[])];state.memos=[...(state.memos||[]),...(d.memos||[])];}}catch(e){}}
function show(id){try{document.getElementById(id).classList.remove('hidden');}catch(e){}}
function hide(id){try{document.getElementById(id).classList.add('hidden');}catch(e){}}
function genCode(){return Math.random().toString(36).substring(2,8).toUpperCase();}

function init(){
  load();
  setTimeout(()=>{
    try{document.getElementById('splash').classList.add('hide');}catch(e){}
    setTimeout(()=>{
      try{hide('splash');}catch(e){}
      const onboarded=localStorage.getItem('onboarded');
      if(onboarded){launch();}else{show('page-onboarding');}
    },400);
  },1200);
}

function obNext(){
  const n=document.getElementById('ob-name').value.trim();
  const d=document.getElementById('ob-date').value;
  if(!n||!d){alert('입력해주세요');return;}
  state.myName=n;state.startDate=d;
  state.myCode=genCode();
  document.getElementById('my-code').textContent=state.myCode;
  hide('page-onboarding');show('page-connect');
}

function obConnect(){
  const c=document.getElementById('ob-code').value.trim();
  if(c.length===6)state.partnerCode=c;
  launch();
}

function obSkip(){launch();}

function launch(){
  save();
  loadPartnerData();
  hide('page-connect');show('page-app');
  const d=new Date(state.startDate||'2025-03-10');
  const diff=Math.floor((new Date()-d)/864e5);
  document.getElementById('dday').textContent='D+'+(diff<0?0:diff);
  document.getElementById('subtitle').textContent=state.myName+'의 공간 💜';
  document.getElementById('set-name').textContent=state.myName||'—';
  document.getElementById('set-date').textContent=state.startDate||'—';
  document.getElementById('set-code').textContent=state.myCode||'—';
  if(state.partnerCode){show('pb');document.getElementById('set-partner').textContent='코드: '+state.partnerCode+' (연동됨)';}
  if(state.startDate){const d=new Date(state.startDate);const k=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();if(!state.events[k])state.events[k]={type:'met',label:'처음 만난 날 💕'};}
  renderCal();renderAlbum();renderMemo();
}

function copyCode(){
  const c=state.myCode||document.getElementById('my-code').textContent;
  if(navigator.clipboard)navigator.clipboard.writeText(c).then(()=>alert('복사됨'));
  else alert('코드: '+c);
}

function connectNow(){
  const c=document.getElementById('set-code-in').value.trim();
  if(c.length!==6){alert('6자리 코드를 입력해주세요');return;}
  state.partnerCode=c;
  save();
  show('pb');
  document.getElementById('set-partner').textContent='코드: '+c+' (연동됨)';
  alert('연동 완료! 💜');
}

function reset(){if(!confirm('초기화할까요?'))return;localStorage.clear();location.reload();}

function dk(y,m,d){return y+'-'+m+'-'+d;}

function renderCal(){
  document.getElementById('month').textContent=curY+'년 '+MN[curM];
  const grid=document.getElementById('cal-grid');grid.innerHTML='';
  const today=new Date();
  const fd=new Date(curY,curM,1).getDay();
  const dim=new Date(curY,curM+1,0).getDate();
  for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='cal-d empty';grid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const e=document.createElement('div');e.className='cal-d';
    const key=dk(curY,curM,d),ev=state.events[key];
    const isToday=today.getFullYear()===curY&&today.getMonth()===curM&&today.getDate()===d;
    if(ev){if(ev.type==='met')e.classList.add('met');else e.classList.add('promise');e.textContent=(ev.type==='met'?'💕':'📅')+d;}else{e.textContent=d;}
    if(isToday)e.classList.add('today');
    e.onclick=()=>openDay(curY,curM,d,key,ev);
    grid.appendChild(e);
  }
  renderUpcoming();
}

function renderUpcoming(){
  const list=document.getElementById('upcoming');list.innerHTML='';
  const today=new Date();
  const up=Object.entries(state.events).filter(([k,v])=>v.type==='promise').map(([k,v])=>{const p=k.split('-');const d=new Date(+p[0],+p[1],+p[2]);return{label:v.label,date:d,diff:Math.ceil((d-today)/864e5)};}).filter(e=>e.diff>=0).sort((a,b)=>a.diff-b.diff).slice(0,3);
  if(!up.length){list.innerHTML='<div style="font-size:12px;color:#999;padding:6px 0;">없음</div>';return;}
  up.forEach(e=>{const c=document.createElement('div');c.className='upcoming-card';c.innerHTML=`<div class="date-circle"><div>${ME[e.date.getMonth()]}</div><div style="font-size:14px;font-weight:600;color:var(--p800);">${e.date.getDate()}</div></div><div style="flex:1;"><div class="upcoming-title">${e.label||'약속'}</div><div class="upcoming-sub">${e.diff===0?'오늘!':'in '+e.diff+'일'}</div></div>`;list.appendChild(c);});
}

function prevM(){curM--;if(curM<0){curM=11;curY--;}renderCal();}
function nextM(){curM++;if(curM>11){curM=0;curY++;}renderCal();}

function openDay(y,m,d,key,ev){
  editKey=key;selType=ev?ev.type:'met';
  document.getElementById('modal-day-date').textContent=y+'년 '+(m+1)+'월 '+d+'일';
  document.getElementById('event-label').value=ev?ev.label:'';
  const ex=document.getElementById('existing'),db=document.getElementById('btn-del');
  if(ev){ex.classList.remove('hidden');document.getElementById('existing-text').textContent=(ev.type==='met'?'💕 만난 날':'📅 약속')+(ev.label?' — '+ev.label:'');db.classList.remove('hidden');document.getElementById('modal-day-title').textContent='일정 수정';}else{ex.classList.add('hidden');db.classList.add('hidden');document.getElementById('modal-day-title').textContent='일정 추가';}
  updateTypeBtn();show('modal-day');
}

function closeDay(){hide('modal-day');editKey=null;}
function setType(t){selType=t;updateTypeBtn();}
function updateTypeBtn(){document.getElementById('btn-met').className='type-btn'+(selType==='met'?'active':'');document.getElementById('btn-promise').className='type-btn'+(selType==='promise'?'active':'');}
function saveEvent(){state.events[editKey]={type:selType,label:document.getElementById('event-label').value.trim()};save();closeDay();renderCal();}
function delEvent(){if(!confirm('삭제할까요?'))return;delete state.events[editKey];save();closeDay();renderCal();}

function renderAlbumFilter(){
  const dates=new Set(state.photos.map(p=>p.date.slice(0,7)));
  const sorted=[...dates].sort().reverse();
  const filter=document.getElementById('date-filter');filter.innerHTML='';
  
  const allBtn=document.createElement('button');allBtn.className='date-filter-btn'+(albumDateFilter==='all'?' active':'');allBtn.textContent='모두';allBtn.onclick=()=>{albumDateFilter='all';renderAlbumFilter();renderAlbum();};filter.appendChild(allBtn);
  
  sorted.forEach(d=>{const btn=document.createElement('button');btn.className='date-filter-btn'+(albumDateFilter===d?' active':'');const [y,m]=d.split('-');btn.textContent=m+'월';btn.onclick=()=>{albumDateFilter=d;renderAlbumFilter();renderAlbum();};filter.appendChild(btn);});
}

function renderAlbum(){
  const grid=document.getElementById('album-grid');grid.innerHTML='';
  let photos=state.photos;
  if(albumDateFilter!=='all'){photos=photos.filter(p=>p.date.slice(0,7)===albumDateFilter);}
  
  photos.forEach(p=>{
    const item=document.createElement('div');item.className='album-item';
    if(p.data){
      const img=document.createElement('img');img.className='album-img';img.src=p.data;img.onclick=()=>alert(p.name+'\n'+p.caption);item.appendChild(img);
      const dateLabel=document.createElement('div');dateLabel.className='album-date';dateLabel.textContent=p.date;item.appendChild(dateLabel);
    }
    const del=document.createElement('button');del.className='album-del-btn';del.innerHTML='×';del.onclick=(e)=>{e.stopPropagation();if(!confirm('삭제할까요?'))return;state.photos=state.photos.filter(x=>x.id!==p.id);save();renderAlbumFilter();renderAlbum();};item.appendChild(del);
    grid.appendChild(item);
  });
  
  const add=document.createElement('div');add.className='album-item album-add';add.innerHTML='<i class="ti ti-plus"></i><span>추가</span>';add.onclick=()=>document.getElementById('photo-input').click();grid.appendChild(add);
}

function addPhoto(){
  const file=document.getElementById('photo-input').files[0];if(!file)return;
  const reader=new FileReader();reader.onload=e=>{tempPhotoData=e.target.result;document.getElementById('photo-preview').src=tempPhotoData;document.getElementById('photo-memo').value='';document.getElementById('photo-caption').value='';show('modal-photo');document.getElementById('photo-input').value='';};reader.readAsDataURL(file);
}

function closePhoto(){hide('modal-photo');tempPhotoData=null;}
function savePhoto(){const name=document.getElementById('photo-memo').value.trim()||'추억';const caption=document.getElementById('photo-caption').value.trim();state.photos.push({id:state.nextPhotoId++,name,caption,data:tempPhotoData,date:new Date().toISOString().slice(0,10)});save();closePhoto();renderAlbumFilter();renderAlbum();}

function renderMemo(){
  const list=document.getElementById('memo-list');list.innerHTML='';
  state.memos.forEach(m=>{const card=document.createElement('div');card.className='memo-card';card.innerHTML=`<div class="memo-header"><span class="memo-title">${m.title}</span><div class="memo-actions"><button class="memo-btn" onclick="editMemo(${m.id})"><i class="ti ti-edit"></i></button><button class="memo-btn" onclick="confirmDelMemo(${m.id})"><i class="ti ti-trash"></i></button></div></div><div class="memo-body">${m.body.replace(/\n/g,'<br>')}</div><div class="memo-date">${m.date}</div>`;list.appendChild(card);});
}

function confirmDelMemo(id){if(!confirm('삭제할까요?'))return;state.memos=state.memos.filter(m=>m.id!==id);save();renderMemo();}
function openMemo(){editMemoId=null;document.getElementById('memo-title').textContent='메모 쓰기 ✏️';document.getElementById('memo-title-in').value='';document.getElementById('memo-body-in').value='';document.getElementById('btn-memo-del').classList.add('hidden');show('modal-memo');}
function editMemo(id){const m=state.memos.find(x=>x.id===id);if(!m)return;editMemoId=id;document.getElementById('memo-title').textContent='메모 수정 ✏️';document.getElementById('memo-title-in').value=m.title;document.getElementById('memo-body-in').value=m.body;document.getElementById('btn-memo-del').classList.remove('hidden');show('modal-memo');}
function closeMemo(){hide('modal-memo');editMemoId=null;}

function saveMemo(){
  const title=document.getElementById('memo-title-in').value.trim();
  const body=document.getElementById('memo-body-in').value.trim();
  
  if(!title&&!body){
    alert('제목이나 내용을 입력해주세요');
    return;
  }
  
  const now=new Date();
  const hour=String(now.getHours()).padStart(2,'0');
  const min=String(now.getMinutes()).padStart(2,'0');
  const dateStr=(now.getMonth()+1)+'월 '+now.getDate()+'일 '+hour+':'+min;
  
  if(editMemoId!==null){
    const m=state.memos.find(x=>x.id===editMemoId);
    if(m){
      m.title=title||'메모';
      m.body=body;
    }
  }else{
    state.memos.push({
      id:state.nextMemoId++,
      title:title||'메모',
      body:body,
      date:dateStr
    });
  }
  
  save();
  closeMemo();
  renderMemo();
}

function delMemo(){if(!confirm('삭제할까요?'))return;state.memos=state.memos.filter(m=>m.id!==editMemoId);save();closeMemo();renderMemo();}
function tab(t,btn){['cal','album','memo','set'].forEach(x=>hide('tab-'+x));document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));show('tab-'+t);btn.classList.add('active');if(t==='album'){renderAlbumFilter();}}

init();
if('serviceWorker' in navigator){navigator.serviceWorker.register('sw.js').catch(e=>null);}

} catch(err) {console.log('Error:',err);}
</script>

</body>
</html>
