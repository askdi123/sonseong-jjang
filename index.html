<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="손성짱 - 커플을 위한 캘린더, 앨범, 메모 앱">
  <meta name="theme-color" content="#534AB7">
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" sizes="192x192" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23534AB7' width='192' height='192'/><text x='96' y='120' font-size='100' text-anchor='middle' font-family='system-ui' fill='white'>🌸</text></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect fill='%23534AB7' width='180' height='180' rx='40'/><text x='90' y='130' font-size='90' text-anchor='middle' font-family='system-ui' fill='white'>🌸</text></svg>">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons@latest/tabler-icons.min.css">
  <title>손성짱 - 우리만의 공간</title>
  
  <style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{--p50:#EEEDFE;--p100:#CECBF6;--p200:#AFA9EC;--p400:#7F77DD;--p600:#534AB7;--p800:#3C3489;--p900:#26215C;}
html,body{width:100%;height:100%;background:#f8f8f8;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:#333;}
.screen{max-width:380px;margin:0 auto;background:#fff;border-radius:20px;border:0.5px solid #e0e0e0;overflow:hidden;min-height:100vh;display:flex;flex-direction:column;box-shadow:0 10px 40px rgba(0,0,0,0.1);}
.ob-wrap{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 28px;gap:0;}
.ob-logo{font-size:48px;margin-bottom:12px;}
.ob-title{font-size:26px;font-weight:500;color:var(--p800);margin-bottom:6px;}
.ob-sub{font-size:13px;color:var(--p400);margin-bottom:36px;text-align:center;line-height:1.6;}
.ob-section{width:100%;margin-bottom:20px;}
.ob-label{font-size:12px;font-weight:500;color:var(--p600);margin-bottom:8px;}
.ob-input{width:100%;padding:10px 14px;border-radius:12px;border:0.5px solid var(--p200);font-size:14px;font-family:inherit;background:var(--p50);color:var(--p900);}
.ob-input:focus{outline:none;border-color:var(--p400);}
.ob-divider{width:100%;text-align:center;font-size:12px;color:var(--p400);margin:4px 0 20px;position:relative;}
.ob-divider::before,.ob-divider::after{content:'';position:absolute;top:50%;width:42%;height:0.5px;background:var(--p100);}
.ob-divider::before{left:0;}.ob-divider::after{right:0;}
.ob-my-code{background:var(--p50);border-radius:12px;padding:12px 16px;margin-bottom:20px;width:100%;}
.ob-my-code-label{font-size:11px;color:var(--p400);margin-bottom:4px;}
.ob-my-code-val{font-size:22px;font-weight:500;color:var(--p800);letter-spacing:4px;}
.ob-my-code-sub{font-size:11px;color:var(--p400);margin-top:3px;}
.btn-primary{width:100%;padding:13px;border-radius:14px;border:none;background:var(--p600);color:#fff;font-size:15px;font-weight:500;cursor:pointer;margin-top:8px;}
.btn-primary:active{opacity:0.85;}
.btn-ghost{width:100%;padding:10px;border-radius:14px;border:0.5px solid var(--p200);background:transparent;color:var(--p600);font-size:13px;cursor:pointer;margin-top:8px;}
/* APP */
.app-header{background:var(--p50);padding:18px 20px 13px;text-align:center;border-bottom:0.5px solid var(--p100);}
.app-title{font-size:21px;font-weight:500;color:var(--p800);letter-spacing:-0.5px;}
.app-subtitle{font-size:11px;color:var(--p400);margin-top:2px;}
.dday-row{display:flex;align-items:center;justify-content:center;gap:8px;margin-top:7px;}
.dday-badge{display:inline-flex;align-items:center;gap:5px;background:var(--p600);color:var(--p50);font-size:12px;font-weight:500;padding:4px 13px;border-radius:20px;}
.partner-badge{display:inline-flex;align-items:center;gap:4px;background:#f5f5f5;color:#666;font-size:11px;padding:4px 10px;border-radius:20px;border:0.5px solid #ddd;}
.nav-tabs{display:flex;border-bottom:0.5px solid #e0e0e0;background:#fafafa;}
.nav-tab{flex:1;padding:11px 4px;border:none;background:transparent;font-size:11px;color:#999;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-family:inherit;}
.nav-tab i{font-size:18px;}
.nav-tab.active{color:var(--p600);border-bottom:2px solid var(--p600);background:#fff;}
.tab-content{flex:1;padding:16px;overflow-y:auto;}
.section-label{font-size:11px;font-weight:500;color:#999;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;}
.hidden{display:none;}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px;}
.cal-dh{text-align:center;font-size:10px;color:#999;padding:4px 0;}
.cal-d{aspect-ratio:1;display:flex;align-items:center;justify-content:center;font-size:12px;border-radius:50%;color:#333;cursor:pointer;}
.cal-d:not(.empty):hover{opacity:0.7;}
.cal-d.today{background:var(--p50);color:var(--p600);font-weight:500;}
.cal-d.met{background:var(--p600);color:#fff;font-weight:500;}
.cal-d.promise{background:#FAC775;color:#633806;font-weight:500;}
.cal-d.empty{opacity:0;pointer-events:none;}
.legend{display:flex;gap:12px;margin-bottom:12px;}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:#999;}
.legend-dot{width:10px;height:10px;border-radius:50%;}
.upcoming-card{background:#f5f5f5;border-radius:10px;border:0.5px solid #e0e0e0;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px;}
.date-circle{width:40px;height:40px;border-radius:50%;background:var(--p50);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;}
.date-circle .mo{font-size:9px;color:var(--p600);font-weight:500;}
.date-circle .dy{font-size:14px;color:var(--p800);font-weight:500;line-height:1;}
.upcoming-info{flex:1;}
.upcoming-title{font-size:13px;font-weight:500;color:#333;}
.upcoming-sub{font-size:11px;color:#999;margin-top:2px;}
.month-group{margin-bottom:24px;}
.month-header{font-size:13px;font-weight:500;color:var(--p800);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.month-header::after{content:'';flex:1;height:0.5px;background:var(--p100);}
.album-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:4px;}
.album-thumb{aspect-ratio:1;border-radius:8px;overflow:hidden;position:relative;cursor:pointer;}
.album-thumb-inner{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;font-size:10px;color:#666;}
.album-thumb-inner i{font-size:20px;color:var(--p400);}
.album-thumb-del{position:absolute;top:3px;right:3px;width:20px;height:20px;border-radius:50%;background:rgba(83,74,183,0.85);border:none;color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.album-add{aspect-ratio:1;border-radius:8px;border:1.5px dashed var(--p200);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;font-size:10px;color:var(--p400);cursor:pointer;background:#fafafa;}
.album-add i{font-size:18px;}
.photo-detail-card{background:#f5f5f5;border-radius:12px;border:0.5px solid #e0e0e0;margin-bottom:14px;overflow:hidden;}
.photo-detail-thumb{width:100%;aspect-ratio:4/3;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;font-size:13px;color:#666;}
.photo-detail-thumb i{font-size:36px;color:var(--p400);}
.photo-detail-info{padding:10px 12px;}
.photo-detail-title{font-size:13px;font-weight:500;color:#333;}
.photo-detail-caption{font-size:12px;color:#666;margin-top:4px;line-height:1.5;}
.photo-detail-date{font-size:10px;color:var(--p400);margin-top:6px;}
.memo-card{background:#f5f5f5;border-radius:10px;border:0.5px solid #e0e0e0;padding:12px;margin-bottom:10px;}
.memo-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;gap:8px;}
.memo-title-text{font-size:13px;font-weight:500;color:#333;flex:1;}
.memo-actions{display:flex;gap:4px;flex-shrink:0;}
.memo-btn{background:none;border:none;cursor:pointer;font-size:14px;padding:2px 4px;color:#999;}
.memo-btn:hover{color:var(--p600);}
.memo-body{font-size:12px;color:#666;line-height:1.6;}
.memo-date{font-size:10px;color:#999;margin-top:8px;text-align:right;}
.add-btn{width:100%;padding:10px;border-radius:10px;border:1.5px dashed var(--p200);background:transparent;color:var(--p600);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:6px;margin-top:4px;}
.modal-backdrop{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(38,33,92,0.5);display:flex;align-items:center;justify-content:center;padding:20px;z-index:100;}
.modal-box{background:#fff;border-radius:16px;border:0.5px solid #e0e0e0;padding:20px;width:100%;max-width:320px;}
.modal-title{font-size:16px;font-weight:500;color:#333;margin-bottom:4px;}
.modal-date-display{font-size:13px;color:var(--p600);margin-bottom:12px;}
.modal-box input,.modal-box textarea{width:100%;padding:8px 12px;border-radius:10px;border:0.5px solid #ddd;font-size:13px;font-family:inherit;background:#f5f5f5;color:#333;margin-bottom:8px;}
.modal-box textarea{resize:vertical;min-height:70px;}
.type-selector{display:flex;gap:8px;margin-bottom:12px;}
.type-btn{flex:1;padding:8px;border-radius:10px;border:0.5px solid #ddd;background:#f5f5f5;font-size:12px;cursor:pointer;color:#666;}
.type-btn.sel-met{background:var(--p50);border-color:var(--p400);color:var(--p800);font-weight:500;}
.type-btn.sel-promise{background:#FAEEDA;border-color:#BA7517;color:#633806;font-weight:500;}
.modal-actions{display:flex;gap:8px;margin-top:8px;}
.btn-cancel{flex:1;padding:8px;border-radius:10px;border:0.5px solid #ddd;background:transparent;font-size:13px;color:#666;cursor:pointer;}
.btn-save{flex:1;padding:8px;border-radius:10px;border:none;background:var(--p600);color:#fff;font-size:13px;font-weight:500;cursor:pointer;}
.btn-del{flex:1;padding:8px;border-radius:10px;border:none;background:#f5f5f5;color:#999;font-size:13px;cursor:pointer;}
.existing-event{background:#f5f5f5;border-radius:8px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#666;border:0.5px solid #e0e0e0;}
.existing-label{font-size:11px;color:#999;margin-bottom:4px;}
.view-toggle{display:flex;gap:6px;margin-bottom:14px;justify-content:flex-end;}
.vt-btn{padding:5px 10px;border-radius:8px;border:0.5px solid #ddd;background:#f5f5f5;font-size:11px;color:#999;cursor:pointer;}
.vt-btn.active{background:var(--p50);border-color:var(--p400);color:var(--p600);}
  </style>
</head>
<body>

<!-- ONBOARDING -->
<div id="page-onboarding" class="screen">
  <div class="ob-wrap">
    <div class="ob-logo">🌸</div>
    <div class="ob-title">손성짱</div>
    <div class="ob-sub">우리만의 공간을 만들어요<br>시작 날짜와 이름을 입력해주세요</div>
    <div class="ob-section">
      <div class="ob-label">내 이름</div>
      <input class="ob-input" id="ob-myname" type="text" placeholder="예: 성민" />
    </div>
    <div class="ob-section" style="margin-bottom:8px;">
      <div class="ob-label">만난 날짜</div>
      <input class="ob-input" id="ob-startdate" type="date" />
    </div>
    <button class="btn-primary" onclick="obNext()">다음 →</button>
  </div>
</div>

<!-- ONBOARDING STEP 2 -->
<div id="page-connect" class="screen hidden">
  <div class="ob-wrap">
    <div style="font-size:36px;margin-bottom:12px;">💜</div>
    <div class="ob-title" style="margin-bottom:6px;">연동하기</div>
    <div class="ob-sub">내 코드를 여친에게 공유하거나<br>여친 코드를 입력해서 연결해요</div>
    <div class="ob-my-code">
      <div class="ob-my-code-label">내 커플 코드</div>
      <div class="ob-my-code-val" id="my-code-display">——</div>
      <div class="ob-my-code-sub">여친한테 이 코드를 알려주세요</div>
    </div>
    <button class="btn-ghost" style="margin-bottom:16px;" onclick="copyCode()">
      <i class="ti ti-copy"></i> 코드 복사하기
    </button>
    <div class="ob-divider">또는 여친 코드 입력</div>
    <div class="ob-section">
      <div class="ob-label">여친 코드 6자리</div>
      <input class="ob-input" id="ob-partnercode" type="text" maxlength="6" placeholder="A1B2C3" style="letter-spacing:4px;font-size:18px;text-align:center;" oninput="this.value=this.value.toUpperCase()" />
    </div>
    <button class="btn-primary" onclick="obConnect()">연동하고 시작하기 →</button>
    <button class="btn-ghost" onclick="obSkip()">나중에 연동할게요</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="page-app" class="screen hidden">
  <div class="app-header">
    <div class="app-title">🌸 손성짱</div>
    <div class="app-subtitle" id="app-subtitle-name">우리만의 공간</div>
    <div class="dday-row">
      <div class="dday-badge"><i class="ti ti-heart"></i><span id="dday-text">D+0</span></div>
      <div class="partner-badge" id="partner-badge" style="display:none;">
        <i class="ti ti-link"></i> <span id="partner-badge-name">연동됨</span>
      </div>
    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" onclick="showTab('calendar',this)"><i class="ti ti-calendar"></i>캘린더</button>
    <button class="nav-tab" onclick="showTab('album',this)"><i class="ti ti-photo"></i>앨범</button>
    <button class="nav-tab" onclick="showTab('memo',this)"><i class="ti ti-notes"></i>메모장</button>
    <button class="nav-tab" onclick="showTab('settings',this)"><i class="ti ti-settings"></i>설정</button>
  </div>

  <!-- CALENDAR -->
  <div id="tab-calendar" class="tab-content">
    <div class="legend">
      <div class="legend-item"><div class="legend-dot" style="background:var(--p600)"></div>만난 날</div>
      <div class="legend-item"><div class="legend-dot" style="background:#FAC775"></div>약속</div>
      <div class="legend-item"><div class="legend-dot" style="background:var(--p50)"></div>오늘</div>
    </div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <button onclick="prevMonth()" style="background:none;border:none;cursor:pointer;color:#999;font-size:20px;padding:2px 8px;">‹</button>
      <span id="month-label" style="font-size:14px;font-weight:500;color:#333;"></span>
      <button onclick="nextMonth()" style="background:none;border:none;cursor:pointer;color:#999;font-size:20px;padding:2px 8px;">›</button>
    </div>
    <div class="cal-grid">
      <div class="cal-dh" style="color:var(--p400)">일</div>
      <div class="cal-dh">월</div><div class="cal-dh">화</div><div class="cal-dh">수</div>
      <div class="cal-dh">목</div><div class="cal-dh">금</div><div class="cal-dh" style="color:var(--p400)">토</div>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
    <div style="margin-top:14px;">
      <div class="section-label">다가오는 약속</div>
      <div id="upcoming-list"></div>
    </div>
  </div>

  <!-- ALBUM -->
  <div id="tab-album" class="tab-content hidden">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;">
      <div class="section-label" style="margin-bottom:0;">추억 앨범</div>
      <div class="view-toggle">
        <button class="vt-btn active" id="vt-grid" onclick="setAlbumView('grid')"><i class="ti ti-layout-grid"></i></button>
        <button class="vt-btn" id="vt-list" onclick="setAlbumView('list')"><i class="ti ti-layout-list"></i></button>
      </div>
    </div>
    <div id="album-container"></div>
  </div>

  <!-- MEMO -->
  <div id="tab-memo" class="tab-content hidden">
    <div class="section-label">우리 메모장</div>
    <div id="memo-list"></div>
    <button class="add-btn" onclick="openMemoModal()"><i class="ti ti-plus"></i>메모 추가</button>
  </div>

  <!-- SETTINGS -->
  <div id="tab-settings" class="tab-content hidden">
    <div class="section-label">설정</div>
    <div style="background:#f5f5f5;border-radius:12px;border:0.5px solid #e0e0e0;overflow:hidden;margin-bottom:16px;">
      <div style="padding:14px 16px;border-bottom:0.5px solid #e0e0e0;">
        <div style="font-size:12px;color:#999;margin-bottom:4px;">내 이름</div>
        <div style="font-size:14px;font-weight:500;color:#333;" id="settings-myname">—</div>
      </div>
      <div style="padding:14px 16px;border-bottom:0.5px solid #e0e0e0;">
        <div style="font-size:12px;color:#999;margin-bottom:4px;">만난 날</div>
        <div style="font-size:14px;font-weight:500;color:#333;" id="settings-startdate">—</div>
      </div>
      <div style="padding:14px 16px;">
        <div style="font-size:12px;color:#999;margin-bottom:4px;">내 커플 코드</div>
        <div style="display:flex;align-items:center;gap:10px;">
          <div style="font-size:18px;font-weight:500;color:var(--p800);letter-spacing:3px;" id="settings-mycode">—</div>
          <button onclick="copyCode()" style="background:var(--p50);border:0.5px solid var(--p200);border-radius:8px;padding:4px 10px;font-size:11px;color:var(--p600);cursor:pointer;">복사</button>
        </div>
      </div>
    </div>
    <div style="background:#f5f5f5;border-radius:12px;border:0.5px solid #e0e0e0;padding:14px 16px;margin-bottom:16px;">
      <div style="font-size:12px;color:#999;margin-bottom:8px;">파트너 연동</div>
      <div id="settings-partner-status" style="font-size:13px;color:#333;margin-bottom:10px;">연동 안 됨</div>
      <input id="settings-partner-input" class="ob-input" type="text" maxlength="6" placeholder="파트너 코드 입력" style="margin-bottom:8px;letter-spacing:3px;font-size:15px;" oninput="this.value=this.value.toUpperCase()" />
      <button onclick="connectFromSettings()" style="width:100%;padding:9px;border-radius:10px;border:none;background:var(--p600);color:#fff;font-size:13px;font-weight:500;cursor:pointer;">연동하기</button>
    </div>
    <button onclick="resetApp()" style="width:100%;padding:10px;border-radius:10px;border:0.5px solid #ddd;background:transparent;color:#999;font-size:13px;cursor:pointer;">처음으로 돌아가기</button>
  </div>
</div>

<!-- DAY MODAL -->
<div id="day-modal" class="modal-backdrop hidden">
  <div class="modal-box">
    <div class="modal-title" id="day-modal-title">일정 추가</div>
    <div class="modal-date-display" id="day-modal-date"></div>
    <div id="existing-area" class="hidden">
      <div class="existing-label">현재 일정</div>
      <div class="existing-event" id="existing-text"></div>
    </div>
    <div class="type-selector">
      <button class="type-btn" id="btn-met" onclick="selType('met')">💕 만난 날</button>
      <button class="type-btn" id="btn-promise" onclick="selType('promise')">📅 약속</button>
    </div>
    <input id="ev-label" type="text" placeholder="메모 (예: 홍대 데이트)" />
    <div class="modal-actions">
      <button class="btn-cancel" onclick="hideDayModal()">취소</button>
      <button id="ev-del-btn" class="btn-del hidden" onclick="deleteEvent()">삭제</button>
      <button class="btn-save" onclick="saveEvent()">저장</button>
    </div>
  </div>
</div>

<!-- PHOTO MODAL -->
<div id="photo-modal" class="modal-backdrop hidden">
  <div class="modal-box">
    <div class="modal-title">추억 추가 📸</div>
    <input id="ph-name" type="text" placeholder="추억 이름 (예: 첫 여행)" />
    <input id="ph-date" type="date" />
    <textarea id="ph-caption" placeholder="사진 설명을 적어보세요 💜" style="min-height:60px;"></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closePhotoModal()">취소</button>
      <button class="btn-save" onclick="savePhoto()">추가</button>
    </div>
  </div>
</div>

<!-- MEMO MODAL -->
<div id="memo-modal" class="modal-backdrop hidden">
  <div class="modal-box">
    <div class="modal-title" id="memo-modal-title">메모 쓰기 ✏️</div>
    <input id="memo-title-in" type="text" placeholder="제목" />
    <textarea id="memo-body-in" placeholder="내용을 입력하세요..."></textarea>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeMemoModal()">취소</button>
      <button class="btn-save" onclick="saveMemo()">저장</button>
    </div>
  </div>
</div>

<script>
const MN=['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
const ME=['JAN','FEB','MAR','APR','MAY','JUN','JUL','AUG','SEP','OCT','NOV','DEC'];
const PC_=['#EEEDFE','#E1F5EE','#E6F1FB','#FAEEDA','#FBEAF0'];
const PI_=['ti-heart','ti-star','ti-moon-stars','ti-sun','ti-camera','ti-tree','ti-plane','ti-building','ti-coffee','ti-music'];

let state = {
  myName: '', startDate: '', myCode: '', partnerCode: '',
  events: {
    '2026-6-10':{type:'met',label:'오늘 만남'},
    '2026-6-22':{type:'promise',label:'홍대 데이트 🎨'},
    '2026-7-4':{type:'promise',label:'100일 기념일 🎂'},
  },
  photos: [
    {id:1,name:'첫 데이트',date:'2025-03-10',caption:'처음 만난 날, 너무 떨렸어 🌸',icon:'ti-heart',color:'#EEEDFE'},
    {id:2,name:'봄 소풍',date:'2025-04-05',caption:'벚꽃 엄청 예뻤다 🌸',icon:'ti-tree',color:'#E1F5EE'},
    {id:3,name:'야경 드라이브',date:'2025-05-18',caption:'야경 보면서 드라이브 최고 🌙',icon:'ti-moon-stars',color:'#E6F1FB'},
  ],
  memos: [
    {id:1,title:'버킷리스트',body:'☑ 홍대 떡볶이 골목\n☑ 한강 자전거\n☐ 제주도 여행\n☐ 부산 해운대',date:'6월 8일'},
    {id:2,title:'오늘의 기억',body:'편의점 아이스크림 같이 먹으면서 걸었는데 너무 행복했다 🍦',date:'6월 10일'},
  ],
  nextPhotoId:4, nextMemoId:3,
};

let curY=2026,curM=5,selType_='met',editKey=null,editMemoId=null,albumView='grid';

// LocalStorage에서 상태 복원
function loadState() {
  const saved = localStorage.getItem('sonseong-state');
  if(saved) state = JSON.parse(saved);
  const onboarded = localStorage.getItem('sonseong-onboarded');
  if(onboarded) {
    hide('page-onboarding'); show('page-connect');
    launchApp();
  }
}

// 상태 저장
function saveState() {
  localStorage.setItem('sonseong-state', JSON.stringify(state));
  localStorage.setItem('sonseong-onboarded', 'true');
}

function genCode(){
  return Math.random().toString(36).substring(2,8).toUpperCase();
}

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

// ONBOARDING
function obNext(){
  const name=document.getElementById('ob-myname').value.trim();
  const dt=document.getElementById('ob-startdate').value;
  if(!name){alert('이름을 입력해주세요!');return;}
  if(!dt){alert('만난 날짜를 선택해주세요!');return;}
  state.myName=name; state.startDate=dt;
  state.myCode=genCode();
  document.getElementById('my-code-display').textContent=state.myCode;
  hide('page-onboarding'); show('page-connect');
}

function obConnect(){
  const pc=document.getElementById('ob-partnercode').value.trim();
  if(pc.length===6) state.partnerCode=pc;
  launchApp();
}
function obSkip(){ launchApp(); }

function launchApp(){
  saveState();
  hide('page-connect'); show('page-app');
  const sd=new Date(state.startDate||'2025-03-10');
  const diff=Math.floor((new Date()-sd)/864e5);
  document.getElementById('dday-text').textContent='D+'+(diff<0?0:diff);
  document.getElementById('app-subtitle-name').textContent=state.myName+'의 공간 💜';
  document.getElementById('settings-myname').textContent=state.myName||'—';
  document.getElementById('settings-startdate').textContent=state.startDate||'—';
  document.getElementById('settings-mycode').textContent=state.myCode||'—';
  if(state.partnerCode){
    const pb=document.getElementById('partner-badge');
    pb.style.display='inline-flex';
    document.getElementById('partner-badge-name').textContent='연동됨';
    document.getElementById('settings-partner-status').textContent='코드: '+state.partnerCode+' (연동됨)';
  }
  if(state.startDate){
    const d=new Date(state.startDate);
    const k=d.getFullYear()+'-'+d.getMonth()+'-'+d.getDate();
    if(!state.events[k]) state.events[k]={type:'met',label:'처음 만난 날 💕'};
  }
  renderCal(); renderAlbum(); renderMemos();
}

function copyCode(){
  const code=state.myCode||document.getElementById('my-code-display').textContent;
  if(navigator.clipboard) navigator.clipboard.writeText(code).then(()=>alert('코드 복사됨: '+code));
  else alert('내 코드: '+code);
}

function connectFromSettings(){
  const pc=document.getElementById('settings-partner-input').value.trim();
  if(pc.length!==6){alert('6자리 코드를 입력해주세요');return;}
  state.partnerCode=pc;
  saveState();
  const pb=document.getElementById('partner-badge');
  pb.style.display='inline-flex';
  document.getElementById('partner-badge-name').textContent='연동됨';
  document.getElementById('settings-partner-status').textContent='코드: '+pc+' (연동됨)';
  alert('연동 완료! 💜\n실제 서버가 있으면 여기서 데이터 동기화 됩니다.');
}

function resetApp(){
  if(!confirm('처음으로 돌아갈까요?')) return;
  localStorage.clear();
  location.reload();
}

// CAL
function dk(y,m,d){return y+'-'+m+'-'+d;}
function renderCal(){
  document.getElementById('month-label').textContent=curY+'년 '+MN[curM];
  const grid=document.getElementById('cal-grid'); grid.innerHTML='';
  const today=new Date();
  const fd=new Date(curY,curM,1).getDay();
  const dim=new Date(curY,curM+1,0).getDate();
  for(let i=0;i<fd;i++){const e=document.createElement('div');e.className='cal-d empty';e.textContent=' ';grid.appendChild(e);}
  for(let d=1;d<=dim;d++){
    const e=document.createElement('div');e.className='cal-d';e.textContent=d;
    const key=dk(curY,curM,d),ev=state.events[key];
    const isToday=today.getFullYear()===curY&&today.getMonth()===curM&&today.getDate()===d;
    if(ev&&ev.type==='promise')e.classList.add('promise');
    else if(ev&&ev.type==='met')e.classList.add('met');
    else if(isToday)e.classList.add('today');
    e.onclick=()=>openDayModal(curY,curM,d,key,ev);
    grid.appendChild(e);
  }
  renderUpcoming();
}
function renderUpcoming(){
  const list=document.getElementById('upcoming-list'); list.innerHTML='';
  const today=new Date();
  const up=Object.entries(state.events)
    .filter(([k,v])=>v.type==='promise')
    .map(([k,v])=>{const p=k.split('-');const d=new Date(+p[0],+p[1],+p[2]);return{label:v.label,date:d,diff:Math.ceil((d-today)/864e5)};})
    .filter(e=>e.diff>=0).sort((a,b)=>a.diff-b.diff).slice(0,3);
  if(!up.length){list.innerHTML='<div style="font-size:12px;color:#999;padding:6px 0;">등록된 약속이 없어요</div>';return;}
  up.forEach(e=>{
    const c=document.createElement('div');c.className='upcoming-card';
    c.innerHTML=`<div class="date-circle"><div class="mo">${ME[e.date.getMonth()]}</div><div class="dy">${e.date.getDate()}</div></div><div class="upcoming-info"><div class="upcoming-title">${e.label||'약속'}</div><div class="upcoming-sub">${e.diff===0?'오늘!':'in '+e.diff+'일'}</div></div>`;
    list.appendChild(c);
  });
}
function prevMonth(){curM--;if(curM<0){curM=11;curY--;}renderCal();}
function nextMonth(){curM++;if(curM>11){curM=0;curY++;}renderCal();}
function openDayModal(y,m,d,key,ev){
  editKey=key; selType_=ev?ev.type:'met';
  document.getElementById('day-modal-date').textContent=y+'년 '+(m+1)+'월 '+d+'일';
  document.getElementById('ev-label').value=ev?ev.label:'';
  const ea=document.getElementById('existing-area'),db=document.getElementById('ev-del-btn');
  if(ev){ea.classList.remove('hidden');document.getElementById('existing-text').textContent=(ev.type==='met'?'💕 만난 날':'📅 약속')+(ev.label?' — '+ev.label:'');db.classList.remove('hidden');document.getElementById('day-modal-title').textContent='일정 수정';}
  else{ea.classList.add('hidden');db.classList.add('hidden');document.getElementById('day-modal-title').textContent='일정 추가';}
  updateTypeBtns();
  show('day-modal');
}
function hideDayModal(){hide('day-modal');editKey=null;}
function selType(t){selType_=t;updateTypeBtns();}
function updateTypeBtns(){
  document.getElementById('btn-met').className='type-btn'+(selType_==='met'?' sel-met':'');
  document.getElementById('btn-promise').className='type-btn'+(selType_==='promise'?' sel-promise':'');
}
function saveEvent(){state.events[editKey]={type:selType_,label:document.getElementById('ev-label').value.trim()};saveState();hideDayModal();renderCal();}
function deleteEvent(){delete state.events[editKey];saveState();hideDayModal();renderCal();}

// ALBUM
function setAlbumView(v){
  albumView=v;
  document.getElementById('vt-grid').className='vt-btn'+(v==='grid'?' active':'');
  document.getElementById('vt-list').className='vt-btn'+(v==='list'?' active':'');
  renderAlbum();
}

function renderAlbum(){
  const container=document.getElementById('album-container');
  container.innerHTML='';
  const groups={};
  state.photos.forEach(p=>{
    const d=new Date(p.date||'2025-01-01');
    const key=d.getFullYear()+'년 '+MN[d.getMonth()];
    if(!groups[key])groups[key]=[];
    groups[key].push(p);
  });
  const sortedKeys=Object.keys(groups).sort((a,b)=>{
    const pa=a.match(/(\d+)년 (\d+)월/),pb=b.match(/(\d+)년 (\d+)월/);
    if(!pa||!pb)return 0;
    return (+pb[1]*12+ +pb[2].replace('월',''))-( +pa[1]*12+ +pa[2].replace('월',''));
  });
  sortedKeys.forEach(monthKey=>{
    const grp=groups[monthKey];
    const section=document.createElement('div');
    section.className='month-group';
    section.innerHTML=`<div class="month-header">${monthKey}</div>`;
    if(albumView==='grid'){
      const grid=document.createElement('div');
      grid.className='album-grid';
      grp.forEach(p=>{
        const thumb=document.createElement('div');
        thumb.className='album-thumb';
        thumb.innerHTML=`<div class="album-thumb-inner" style="background:${p.color};"><i class="ti ${p.icon}"></i><span>${p.name}</span></div><button class="album-thumb-del" onclick="deletePhoto(${p.id})"><i class="ti ti-x"></i></button>`;
        grid.appendChild(thumb);
      });
      section.appendChild(grid);
    } else {
      grp.forEach(p=>{
        const card=document.createElement('div');
        card.className='photo-detail-card';
        card.innerHTML=`<div class="photo-detail-thumb" style="background:${p.color};"><i class="ti ${p.icon}"></i><span style="font-size:14px;font-weight:500;">${p.name}</span></div><div class="photo-detail-info"><div style="display:flex;justify-content:space-between;align-items:flex-start;"><div class="photo-detail-title">${p.name}</div><button onclick="deletePhoto(${p.id})" style="background:none;border:none;cursor:pointer;color:#999;font-size:14px;"><i class="ti ti-trash"></i></button></div>${p.caption?'<div class="photo-detail-caption">'+p.caption+'</div>':''}<div class="photo-detail-date">${p.date}</div></div>`;
        section.appendChild(card);
      });
    }
    container.appendChild(section);
  });
  const addWrap=document.createElement('div');
  if(albumView==='grid'){
    const addGrid=document.createElement('div');
    addGrid.className='album-grid';
    const addBtn=document.createElement('div');
    addBtn.className='album-add'; addBtn.onclick=openPhotoModal;
    addBtn.innerHTML='<i class="ti ti-plus"></i><span>추가</span>';
    addGrid.appendChild(addBtn);
    addWrap.appendChild(addGrid);
  } else {
    const addBtn=document.createElement('button');
    addBtn.className='add-btn'; addBtn.onclick=openPhotoModal;
    addBtn.innerHTML='<i class="ti ti-plus"></i>추억 추가';
    addWrap.appendChild(addBtn);
  }
  container.appendChild(addWrap);
}

function deletePhoto(id){state.photos=state.photos.filter(p=>p.id!==id);saveState();renderAlbum();}
function openPhotoModal(){
  document.getElementById('ph-name').value='';document.getElementById('ph-date').value='';document.getElementById('ph-caption').value='';
  show('photo-modal');
}
function closePhotoModal(){hide('photo-modal');}
function savePhoto(){
  const name=document.getElementById('ph-name').value.trim()||'추억';
  const dateVal=document.getElementById('ph-date').value;
  const caption=document.getElementById('ph-caption').value.trim();
  const ci=state.nextPhotoId%PC_.length;
  state.photos.push({id:state.nextPhotoId++,name,date:dateVal||new Date().toISOString().slice(0,10),caption,icon:PI_[ci%PI_.length],color:PC_[ci]});
  saveState();closePhotoModal();renderAlbum();
}

// MEMO
function renderMemos(){
  const list=document.getElementById('memo-list'); list.innerHTML='';
  state.memos.forEach(m=>{
    const card=document.createElement('div');card.className='memo-card';
    card.innerHTML=`<div class="memo-header"><span class="memo-title-text">${m.title}</span><div class="memo-actions"><button class="memo-btn" onclick="openEditMemo(${m.id})"><i class="ti ti-edit"></i></button><button class="memo-btn" onclick="deleteMemo(${m.id})"><i class="ti ti-trash"></i></button></div></div><div class="memo-body">${m.body.replace(/\n/g,'<br>')}</div><div class="memo-date">${m.date}</div>`;
    list.appendChild(card);
  });
}
function deleteMemo(id){state.memos=state.memos.filter(m=>m.id!==id);saveState();renderMemos();}
function openMemoModal(){document.getElementById('memo-modal-title').textContent='메모 쓰기 ✏️';document.getElementById('memo-title-in').value='';document.getElementById('memo-body-in').value='';editMemoId=null;show('memo-modal');}
function openEditMemo(id){const m=state.memos.find(m=>m.id===id);if(!m)return;editMemoId=id;document.getElementById('memo-modal-title').textContent='메모 수정 ✏️';document.getElementById('memo-title-in').value=m.title;document.getElementById('memo-body-in').value=m.body;show('memo-modal');}
function closeMemoModal(){hide('memo-modal');editMemoId=null;}
function saveMemo(){
  const title=document.getElementById('memo-title-in').value.trim();
  const body=document.getElementById('memo-body-in').value.trim();
  if(!title&&!body){closeMemoModal();return;}
  const today=new Date();const dateStr=(today.getMonth()+1)+'월 '+today.getDate()+'일';
  if(editMemoId!==null){const m=state.memos.find(m=>m.id===editMemoId);if(m){m.title=title||'메모';m.body=body;}}
  else{state.memos.push({id:state.nextMemoId++,title:title||'메모',body,date:dateStr});}
  saveState();closeMemoModal();renderMemos();
}

function showTab(tab,btn){
  ['calendar','album','memo','settings'].forEach(t=>hide('tab-'+t));
  document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));
  show('tab-'+tab); btn.classList.add('active');
}

// 초기화
loadState();
if(localStorage.getItem('sonseong-onboarded')) {
  launchApp();
}

// Service Worker 등록
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(e => console.log('SW 등록 실패:', e));
}
</script>

</body>
</html>
